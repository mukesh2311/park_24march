<!DOCTYPE html>
<html>
<head>
<title>Smart Parking</title>
<style>
body{text-align:center;font-family:Arial;}
.free{color:green;}
.occ{color:red;}
</style>
</head>

<body>

<h1>🚗 Smart Parking</h1>

<button onclick="book(1)">Book Slot 1</button>
<p id="s1">Loading...</p>

<button onclick="book(2)">Book Slot 2</button>
<p id="s2">Loading...</p>

<h3>Signal: <span id="rssi"></span></h3>

<script>
const USER="YOUR_USERNAME";
const KEY="YOUR_AIO_KEY";

function book(n){
 fetch(`https://io.adafruit.com/api/v2/${USER}/feeds/booking-s${n}/data`,{
  method:"POST",
  headers:{"X-AIO-Key":KEY,"Content-Type":"application/json"},
  body:JSON.stringify({value:1})
 });
}

function update(){
 fetch(`https://io.adafruit.com/api/v2/${USER}/feeds/parking-s1/data/last`,
 {headers:{"X-AIO-Key":KEY}})
 .then(r=>r.json()).then(d=>{
  s1.innerHTML=d.value==0?"<span class='free'>FREE</span>":"<span class='occ'>OCCUPIED</span>";
 });

 fetch(`https://io.adafruit.com/api/v2/${USER}/feeds/parking-s2/data/last`,
 {headers:{"X-AIO-Key":KEY}})
 .then(r=>r.json()).then(d=>{
  s2.innerHTML=d.value==0?"<span class='free'>FREE</span>":"<span class='occ'>OCCUPIED</span>";
 });

 fetch(`https://io.adafruit.com/api/v2/${USER}/feeds/rssi/data/last`,
 {headers:{"X-AIO-Key":KEY}})
 .then(r=>r.json()).then(d=>{
  rssi.innerHTML=d.value+" dBm";
 });
}

setInterval(update,2000);
</script>

</body>
</html>
